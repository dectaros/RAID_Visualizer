<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAID 50</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body class="raid-page">
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="title">RAID 50</div>
      <div class="subtitle">Space = next step | R = restart</div>
    </div>

    <div class="legend">
      <span style="color: var(--blue)"><i class="swatch"></i>Data</span>
      <span style="color: var(--purple)"><i class="swatch"></i>Mirror</span>
      <span style="color: var(--orange)"><i class="swatch"></i>Parity</span>
      <span style="color: var(--teal)"><i class="swatch"></i>Second parity / spare</span>
      <span style="color: var(--red)"><i class="swatch"></i>Failed drive</span>
    </div>

    <div class="source-wrap">
      <div class="source-frame" id="sourceFrame">
        <div class="source-img"></div>
        <div class="grid" id="sourceGrid"></div>
        <div class="data-lost" id="dataLost">DATA LOST</div>
        <div class="cross" id="sourceCross"></div>
      </div>
      <div class="restore-frame" id="restoreFrame"></div>
    </div>

    <div class="status" id="statusText">Press Space to advance the animation.</div>
    <div class="drives-wrap" id="drivesWrap"></div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    const RAID_CONFIG = {"name": "RAID 50", "type": "raid50", "drives": 6, "desc": "RAID 50 stripes across two RAID 5 groups for more performance and fault tolerance than a single RAID 5.", "result": "RAID 50 can survive one failed drive per RAID 5 group while keeping good read and write throughput.", "fail": [2], "tolerate": true, "formula": "Per-group rebuild: missing block = data XOR data XOR parity", "algorithm_formula": "Inside each RAID 5 group, parity is calculated before the stripe is written", "cpu_load": "35%", "rebuild_tile_ms": 260, "rebuild_pause_ms": 140};
  </script>
  <script src="common.js"></script>
</body>
</html>
