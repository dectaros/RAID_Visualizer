<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADAPT</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body class="raid-page">
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="title">ADAPT</div>
      <div class="subtitle">Space = next step | R = restart</div>
    </div>

    <div class="legend">
      <span style="color: var(--blue)"><i class="swatch"></i>Data</span>
      <span style="color: var(--purple)"><i class="swatch"></i>Mirror</span>
      <span style="color: var(--orange)"><i class="swatch"></i>Parity</span>
      <span style="color: var(--teal)"><i class="swatch"></i>Second parity / spare</span>
      <span style="color: var(--red)"><i class="swatch"></i>Failed drive</span>
    </div>

    <div class="source-wrap">
      <div class="source-frame" id="sourceFrame">
        <div class="source-img"></div>
        <div class="grid" id="sourceGrid"></div>
        <div class="data-lost" id="dataLost">DATA LOST</div>
        <div class="cross" id="sourceCross"></div>
      </div>
      <div class="restore-frame" id="restoreFrame"></div>
    </div>

    <div class="status" id="statusText">Press Space to advance the animation.</div>
    <div class="drives-wrap" id="drivesWrap"></div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    const RAID_CONFIG = {"name": "ADAPT", "type": "adapt", "drives": 12, "desc": "ADAPT uses distributed parity and N+2 shared spare protection across the whole array to accelerate rebuilds. This visualizer uses a minimum 12-drive layout.", "result": "ADAPT spreads spare capacity and rebuild work across the whole array with N+2 protection, so up to two failed drives can still be rebuilt in this simplified model.", "fail": [10], "tolerate": true, "algorithm_formula": "Parity and shared spare capacity are distributed across the whole 12-drive set with N+2 reserve", "cpu_load": "15%", "copy_tile_ms": 780, "rebuild_tile_ms": 30, "rebuild_pause_ms": 20};
  </script>
  <script src="common.js"></script>
</body>
</html>
