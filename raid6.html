<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAID 6</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body class="raid-page">
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="title">RAID 6</div>
      <div class="subtitle">Space = next step | R = restart</div>
    </div>

    <div class="legend">
      <span style="color: var(--blue)"><i class="swatch"></i>Data</span>
      <span style="color: var(--purple)"><i class="swatch"></i>Mirror</span>
      <span style="color: var(--orange)"><i class="swatch"></i>Parity</span>
      <span style="color: var(--teal)"><i class="swatch"></i>Second parity / spare</span>
      <span style="color: var(--red)"><i class="swatch"></i>Failed drive</span>
    </div>

    <div class="source-wrap">
      <div class="source-frame" id="sourceFrame">
        <div class="source-img"></div>
        <div class="grid" id="sourceGrid"></div>
        <div class="data-lost" id="dataLost">DATA LOST</div>
        <div class="cross" id="sourceCross"></div>
      </div>
      <div class="restore-frame" id="restoreFrame"></div>
    </div>

    <div class="status" id="statusText">Press Space to advance the animation.</div>
    <div class="drives-wrap" id="drivesWrap"></div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    const RAID_CONFIG = {"name": "RAID 6", "type": "parity2", "drives": 4, "desc": "RAID 6 stripes data and rotates dual parity, so two drives may fail without data loss.", "result": "RAID 6 spends capacity on dual parity but can recover from up to two simultaneous drive failures.", "fail": [2, 3], "tolerate": true, "formula": "Rebuild uses P parity and Q parity; this animation is a simplified illustration.", "algorithm_formula": "P = XOR parity, Q = second independent parity", "cpu_load": "50%", "rebuild_tile_ms": 600, "rebuild_pause_ms": 260};
  </script>
  <script src="common.js"></script>
</body>
</html>
