<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAID 60</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body class="raid-page">
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="title">RAID 60</div>
      <div class="subtitle">Space = next step | R = restart</div>
    </div>

    <div class="legend">
      <span style="color: var(--blue)"><i class="swatch"></i>Data</span>
      <span style="color: var(--purple)"><i class="swatch"></i>Mirror</span>
      <span style="color: var(--orange)"><i class="swatch"></i>Parity</span>
      <span style="color: var(--teal)"><i class="swatch"></i>Second parity / spare</span>
      <span style="color: var(--red)"><i class="swatch"></i>Failed drive</span>
    </div>

    <div class="source-wrap">
      <div class="source-frame" id="sourceFrame">
        <div class="source-img"></div>
        <div class="grid" id="sourceGrid"></div>
        <div class="data-lost" id="dataLost">DATA LOST</div>
        <div class="cross" id="sourceCross"></div>
      </div>
      <div class="restore-frame" id="restoreFrame"></div>
    </div>

    <div class="status" id="statusText">Press Space to advance the animation.</div>
    <div class="drives-wrap" id="drivesWrap"></div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    const RAID_CONFIG = {"name": "RAID 60", "type": "raid60", "drives": 8, "desc": "RAID 60 stripes across RAID 6 groups, combining scale with dual-parity protection in each group.", "result": "RAID 60 can survive up to two failed drives per RAID 6 group while supporting larger arrays.", "fail": [2, 3, 6, 7], "tolerate": true, "formula": "Per-group rebuild uses P and Q parity; this animation is simplified.", "algorithm_formula": "Inside each RAID 6 group, data is written together with calculated P and Q parity", "cpu_load": "60%", "rebuild_tile_ms": 420, "rebuild_pause_ms": 200};
  </script>
  <script src="common.js"></script>
</body>
</html>
