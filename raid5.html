<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAID 5</title>
  <link rel="stylesheet" href="common.css" />
</head>
<body class="raid-page">
  <div class="stage" id="stage">
    <div class="topbar">
      <div class="title">RAID 5</div>
      <div class="subtitle">Space = next step | R = restart</div>
    </div>

    <div class="legend">
      <span style="color: var(--blue)"><i class="swatch"></i>Data</span>
      <span style="color: var(--purple)"><i class="swatch"></i>Mirror</span>
      <span style="color: var(--orange)"><i class="swatch"></i>Parity</span>
      <span style="color: var(--teal)"><i class="swatch"></i>Second parity / spare</span>
      <span style="color: var(--red)"><i class="swatch"></i>Failed drive</span>
    </div>

    <div class="source-wrap">
      <div class="source-frame" id="sourceFrame">
        <div class="source-img"></div>
        <div class="grid" id="sourceGrid"></div>
        <div class="data-lost" id="dataLost">DATA LOST</div>
        <div class="cross" id="sourceCross"></div>
      </div>
      <div class="restore-frame" id="restoreFrame"></div>
    </div>

    <div class="status" id="statusText">Press Space to advance the animation.</div>
    <div class="drives-wrap" id="drivesWrap"></div>
    <div class="caption" id="caption"></div>
  </div>

  <script>
    const RAID_CONFIG = {"name": "RAID 5", "type": "parity1", "drives": 3, "desc": "RAID 5 stripes data and rotates XOR parity so one failed drive can be reconstructed.", "result": "RAID 5 uses one drive worth of parity capacity and can recover from a single drive failure.", "fail": [2], "tolerate": true, "formula": "Rebuild example: missing block = D1 XOR D2 XOR P", "algorithm_formula": "Parity example: P = D1.1 XOR D1.2", "cpu_load": "30%"};
  </script>
  <script src="common.js"></script>
</body>
</html>
